<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics: Route Control | VIP Waters</title>
    <link rel="icon" type="image/png" href="logo-vip.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #c5c5c5 50%, #bbbbbb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 153, 51, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 153, 51, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(255, 153, 51, 0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            background: #2a1d84;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 153, 51, 0.15) 0%, transparent 70%);
            animation: rotateGlow 20s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-overlay {
            width: 300px;
            height: auto;
            margin: 0 auto 15px;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
            animation: logoFloat 4s ease-in-out infinite;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .logo-overlay:hover {
            transform: scale(1.05);
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .form-content {
            padding: 40px;
            position: relative;
        }

        .form-title {
            color: #2a1d84;
            font-size: 1.9em;
            margin-bottom: 10px;
            text-align: center;
            animation: fadeInDown 0.8s ease 0.3s both;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95em;
            animation: fadeInDown 0.8s ease 0.4s both;
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease both;
            position: relative;
            z-index: 1;
        }

        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.6s; }
        .form-group:nth-child(3) { animation-delay: 0.7s; }
        .form-group:nth-child(4) { animation-delay: 0.8s; }
        .form-group:nth-child(5) { animation-delay: 0.9s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            color: #2a1d84;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
            transition: color 0.3s ease;
        }

        .required {
            color: #2a1d84;
            margin-left: 4px;
            animation: requiredPulse 2s ease-in-out infinite;
        }

        @keyframes requiredPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            background: white;
            position: relative;
        }

        input[type="text"]:hover:not([readonly]),
        input[type="number"]:hover,
        select:hover {
            border-color: #2a1d84;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 153, 51, 0.15);
        }

        input[type="text"]:focus:not([readonly]),
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #2a1d84;
            box-shadow: 0 0 0 4px rgba(255, 153, 51, 0.15), 0 4px 12px rgba(255, 153, 51, 0.2);
            transform: translateY(-2px);
        }

        input[readonly] {
            background-color: #f5f5f5;
            color: #666;
            cursor: not-allowed;
            border-color: #dcdcdc;
        }

        select {
            cursor: pointer;
            background-color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2a1d84 0%, #2a1d84 50%, #2a1d84 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(37, 138, 133, 0.35);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease 1.1s both;
            margin-top: 15px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 138, 133, 0.5);
            background-position: 100% 0;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:disabled {
            background: linear-gradient(135deg, #CCCCCC 0%, #999999 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .mensaje {
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideInMessage 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInMessage {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .mensaje.exito {
            background: linear-gradient(135deg, #D4EDDA 0%, #c3e6cb 100%);
            border: 2px solid #28A745;
            color: #155724;
        }

        .mensaje.error {
            background: linear-gradient(135deg, #F8D7DA 0%, #f5c6cb 100%);
            border: 2px solid #DC3545;
            color: #721C24;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a1d84;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
                background: white;
            }

            body::before {
                display: none;
            }

            .container {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }

            .header {
                padding: 20px 15px;
            }

            .form-content {
                padding: 25px 20px;
                flex: 1;
            }

            .form-title {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="lgo-vip.jpg" alt="VIP Waters!" class="logo-overlay" onerror="this.src='https://via.placeholder.com/300x100?text=VIP+Waters'">
        </div>

        <div class="form-content">
            <h2 class="form-title">Product Delivery Route</h2>
            <p class="form-subtitle">Register delivery metrics for the scanned route</p>

            <div id="mensaje" class="mensaje"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #666;">Processing and redirecting to WhatsApp...</p>
            </div>

            <form id="formulario">
                
                <div class="form-group">
                    <label for="route_id">Route ID (Auto-filled by QR) <span class="required">*</span></label>
                    <input type="text" id="route_id" name="route_id" placeholder="Scanning error" required readonly>
                </div>

                <div class="form-group">
                    <label for="full_delivered">Full Bottles Delivered <span class="required">*</span></label>
                    <input type="number" id="full_delivered" name="full_delivered" min="0" placeholder="E.g. 15" required>
                </div>

                <div class="form-group">
                    <label for="empty_returned">Empty Bottles Returned <span class="required">*</span></label>
                    <input type="number" id="empty_returned" name="empty_returned" min="0" placeholder="E.g. 12" required>
                </div>

                <div class="form-group">
                    <label for="payment">Payment Method <span class="required">*</span></label>
                    <select id="payment" name="payment" required>
                        <option value="">Select an option</option>
                        <option value="Cash">💵 Cash</option>
                        <option value="Transfer">🏦 Bank Transfer</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="btnEnviar">REGISTER DELIVERY</button>
            </form>
        </div>
    </div>

    <script>
        // Replace with your actual Google Apps Script Web App URL
        const SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; 
        const WHATSAPP_NUMBER = '3515631347'; // Default WhatsApp number

        // Function to extract URL parameters (simulating QR Code scan data)
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Initialize the form when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            const routeIdParam = getURLParameter('route_id');
            
            if (routeIdParam) {
                document.getElementById('route_id').value = routeIdParam;
            } else {
                // For demonstration or manual entry fallback if no QR is used
                document.getElementById('route_id').value = "ROUTE-PENDING";
            }
        });

        const formulario = document.getElementById('formulario');
        const loading = document.getElementById('loading');
        const mensaje = document.getElementById('mensaje');
        const btnEnviar = document.getElementById('btnEnviar');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Gather Form Data
            const datos = {
                route_id: document.getElementById('route_id').value,
                full_delivered: document.getElementById('full_delivered').value,
                empty_returned: document.getElementById('empty_returned').value,
                payment: document.getElementById('payment').value
            };

            // Display loading animation
            formulario.style.display = 'none';
            loading.style.display = 'block';
            btnEnviar.disabled = true;

            try {
                // Send data to Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(datos)
                });

                // Generate WhatsApp formatting
                const mensajeWhatsApp = 
                    '🚚 *NEW DELIVERY REGISTERED*' + '%0A%0A' +
                    '📍 *Route ID:* ' + datos.route_id + '%0A' +
                    '💧 *Full Delivered:* ' + datos.full_delivered + '%0A' +
                    '♻️ *Empty Returned:* ' + datos.empty_returned + '%0A' +
                    '💳 *Payment Method:* ' + datos.payment;

                const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMBER}?text=${mensajeWhatsApp}`;

                mostrarMensaje('exito', '✅ Delivery logged successfully! Redirecting to WhatsApp...');

                // Redirect after a brief delay
                setTimeout(() => {
                    window.location.href = urlWhatsApp;
                }, 1500);

            } catch (error) {
                console.error('Submission Error:', error);
                mostrarMensaje('error', '❌ An error occurred while submitting the form. Please try again.');
                loading.style.display = 'none';
                formulario.style.display = 'block';
                btnEnviar.disabled = false;
            }
        });

        function mostrarMensaje(tipo, texto) {
            mensaje.className = `mensaje ${tipo}`;
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
