<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistica: Control de Ruta | Aguas VIP AG</title>
    <link rel="icon" type="image/png" href="logo-vip.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #c5c5c5 50%, #bbbbbb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 153, 51, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 153, 51, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(255, 153, 51, 0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            background: #2a1d84;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 153, 51, 0.15) 0%, transparent 70%);
            animation: rotateGlow 20s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-overlay {
            width: 200px;
            height: auto;
            margin: 0 auto 15px;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
            animation: logoFloat 4s ease-in-out infinite;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .logo-overlay:hover {
            transform: scale(1.05);
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .form-content {
            padding: 20px;
            position: relative;
        }

        .form-title {
            color: #2a1d84;
            font-size: 1.9em;
            margin-bottom: 10px;
            text-align: center;
            animation: fadeInDown 0.8s ease 0.3s both;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95em;
            animation: fadeInDown 0.8s ease 0.4s both;
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease both;
            position: relative;
            z-index: 1;
        }

        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.6s; }
        .form-group:nth-child(3) { animation-delay: 0.7s; }
        .form-group:nth-child(4) { animation-delay: 0.8s; }
        .form-group:nth-child(5) { animation-delay: 0.9s; }
        .form-group:nth-child(6) { animation-delay: 1.0s; }
        .form-group:nth-child(7) { animation-delay: 1.1s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            color: #2a1d84;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
            transition: color 0.3s ease;
        }

        .required {
            color: #e53935;
            margin-left: 4px;
            animation: requiredPulse 2s ease-in-out infinite;
        }

        @keyframes requiredPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            background: white;
            position: relative;
        }

        input[type="text"]:hover:not([readonly]),
        input[type="number"]:hover,
        select:hover {
            border-color: #2a1d84;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 153, 51, 0.15);
        }

        input[type="text"]:focus:not([readonly]),
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #2a1d84;
            box-shadow: 0 0 0 4px rgba(255, 153, 51, 0.15), 0 4px 12px rgba(255, 153, 51, 0.2);
            transform: translateY(-2px);
        }

        input[readonly] {
            background-color: #f5f5f5;
            color: #666;
            cursor: not-allowed;
            border-color: #dcdcdc;
        }

        select {
            cursor: pointer;
            background-color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2a1d84 0%, #2a1d84 50%, #2a1d84 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(42, 29, 132, 0.35);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease 1.3s both;
            margin-top: 15px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(42, 29, 132, 0.5);
            background-position: 100% 0;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:disabled {
            background: linear-gradient(135deg, #CCCCCC 0%, #999999 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .mensaje {
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideInMessage 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInMessage {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .mensaje.exito {
            background: linear-gradient(135deg, #D4EDDA 0%, #c3e6cb 100%);
            border: 2px solid #28A745;
            color: #155724;
        }

        .mensaje.error {
            background: linear-gradient(135deg, #F8D7DA 0%, #f5c6cb 100%);
            border: 2px solid #DC3545;
            color: #721C24;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a1d84;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
                background: white;
            }

            body::before {
                display: none;
            }

            .container {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }

            .header {
                padding: 20px 15px;
            }

            .form-content {
                padding: 25px 20px;
                flex: 1;
            }

            .form-title {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="lgo-vip.jpg" alt="VIP Waters!" class="logo-overlay" onerror="this.src='https://via.placeholder.com/300x100?text=VIP+Waters'">
        </div>

        <div class="form-content">
            <h2 class="form-title">Control de Rutas y Productos Entregados</h2>
            <p class="form-subtitle">Registro de Entregas a Clientes - Control de Rutas</p>

            <div id="mensaje" class="mensaje"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #666;">Guardando datos y redirigiendo a WhatsApp...</p>
            </div>

            <!-- ================================================================
                 CAMPOS DEL FORMULARIO — vinculados a columnas de la planilla:
                 Col A: ID_Ruta         → name="ID Ruta"
                 Col B: Id_Nota_Entrega → name="Id Nota Entrega"
                 Col C: Cliente         → name="Cliente"
                 Col D: Producto        → name="Producto"
                 Col E: Cantidad        → name="Cantidad"
                 Col F: Pagos           → name="Pagos"
                 Col G: Bidones_Entregados → name="Bidone Entregados"
                 Col H: Bidones_Recibidos  → name="Bidone Recibidos"
                 ================================================================ -->
            <form id="formulario">

                <!-- Columna A: ID Ruta (auto-completado por QR) -->
                <div class="form-group">
                    <label for="ID_Ruta">ID de Ruta (Auto-completado por QR) <span class="required">*</span></label>
                    <input type="text" id="ID_Ruta" name="ID Ruta" placeholder="Error en escaneo" required readonly>
                </div>

                <!-- Columna B: Id Nota Entrega -->
                <div class="form-group">
                    <label for="Id_Nota_Entrega">Nota de Entrega <span class="required">*</span></label>
                    <input type="number" id="Id_Nota_Entrega" name="Id Nota Entrega" min="0" placeholder="Ej: 15" required>
                </div>

                <!-- Columna C: Cliente -->
                <div class="form-group">
                    <label for="Cliente">Cliente <span class="required">*</span></label>
                    <input type="text" id="Cliente" name="Cliente" placeholder="Ej: Juan Pérez" required>
                </div>

                <!-- Columna D: Producto -->
                <div class="form-group">
                    <label for="Producto">Producto <span class="required">*</span></label>
                    <input type="text" id="Producto" name="Producto" placeholder="Ej: Bidón 20L" required>
                </div>

                <!-- Columna E: Cantidad -->
                <div class="form-group">
                    <label for="Cantidad">Cantidad <span class="required">*</span></label>
                    <input type="number" id="Cantidad" name="Cantidad" min="0" placeholder="Ej: 10" required>
                </div>

                <!-- Columna F: Pagos (método de pago) -->
                <div class="form-group">
                    <label for="Pagos">Método de Pago <span class="required">*</span></label>
                    <select id="Pagos" name="Pagos" required>
                        <option value="">Seleccione una opción</option>
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">🏦 Transferencia</option>
                    </select>
                </div>

                <!-- Columna G: Bidones Entregados -->
                <div class="form-group">
                    <label for="Bidone_Entregados">Bidones Entregados <span class="required">*</span></label>
                    <input type="number" id="Bidone_Entregados" name="Bidone Entregados" min="0" placeholder="Ej: 12" required>
                </div>

                <!-- Columna H: Bidones Recibidos -->
                <div class="form-group">
                    <label for="Bidone_Recibidos">Bidones Recibidos <span class="required">*</span></label>
                    <input type="number" id="Bidone_Recibidos" name="Bidone Recibidos" min="0" placeholder="Ej: 10" required>
                </div>

                <button type="submit" class="submit-btn" id="btnEnviar">REGISTRAR ENVÍO</button>

            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        // *** IMPORTANTE: pegá acá la URL de tu deployment activo ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzTTE-dfPnauwl6PXXtxNFdezjg7MnWVg2jFyCK3CFs0W9KU1cbemlPCrASV_1gf0jw9A/exec';
        const WHATSAPP_NUMBER = '1167401640';

        // ------------------------------------------------------------
        // Lee parámetros de la URL (datos del QR)
        // ------------------------------------------------------------
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Auto-completar ID de Ruta desde el QR al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            const routeIdParam = getURLParameter('route_id');
            document.getElementById('ID_Ruta').value = routeIdParam || 'RUTA-PENDIENTE';
        });

        // ------------------------------------------------------------
        // Envío del formulario
        // ------------------------------------------------------------
        const formulario = document.getElementById('formulario');
        const loading    = document.getElementById('loading');
        const mensaje    = document.getElementById('mensaje');
        const btnEnviar  = document.getElementById('btnEnviar');

        formulario.addEventListener('submit', function(e) {
            e.preventDefault();

            // ── 1. Recolectar datos ─────────────────────────────
            var idRuta          = document.getElementById('ID_Ruta').value;
            var idNota          = document.getElementById('Id_Nota_Entrega').value;
            var cliente         = document.getElementById('Cliente').value;
            var producto        = document.getElementById('Producto').value;
            var cantidad        = document.getElementById('Cantidad').value;
            var pagos           = document.getElementById('Pagos').value;
            var bidoEntregados  = document.getElementById('Bidone_Entregados').value;
            var bidoRecibidos   = document.getElementById('Bidone_Recibidos').value;

            // ── 2. Construir URL de WhatsApp ─────────────────────
            var nl = '%0A';
            var msgWA =
                '%F0%9F%9A%9A *NUEVO MOVIMIENTO REGISTRADO*'  + nl + nl +
                '%F0%9F%93%8D *ID de Ruta:* '         + encodeURIComponent(idRuta)         + nl +
                '%F0%9F%A7%BE *Nota de Entrega:* '    + encodeURIComponent(idNota)         + nl +
                '%F0%9F%91%A4 *Cliente:* '             + encodeURIComponent(cliente)        + nl +
                '%F0%9F%93%A6 *Producto:* '            + encodeURIComponent(producto)       + nl +
                '%F0%9F%94%A2 *Cantidad:* '            + encodeURIComponent(cantidad)       + nl +
                '%F0%9F%92%B3 *Método de Pago:* '      + encodeURIComponent(pagos)          + nl +
                '%F0%9F%92%A7 *Bidones Entregados:* '  + encodeURIComponent(bidoEntregados) + nl +
                '%E2%99%BB%EF%B8%8F *Bidones Recibidos:* ' + encodeURIComponent(bidoRecibidos);

            var urlWA = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + msgWA;

            // ── 3. Construir URL de GAS con parámetros GET ───────
            // Este método funciona desde file://, servidor web y
            // cualquier hosting porque GAS responde a GET sin CORS.
            var gasUrl = SCRIPT_URL
                + '?ID+Ruta='           + encodeURIComponent(idRuta)
                + '&Id+Nota+Entrega='   + encodeURIComponent(idNota)
                + '&Cliente='           + encodeURIComponent(cliente)
                + '&Producto='          + encodeURIComponent(producto)
                + '&Cantidad='          + encodeURIComponent(cantidad)
                + '&Pagos='             + encodeURIComponent(pagos)
                + '&Bidone+Entregados=' + encodeURIComponent(bidoEntregados)
                + '&Bidone+Recibidos='  + encodeURIComponent(bidoRecibidos);

            // ── 4. Mostrar estado y disparar GAS + WA ────────────
            formulario.style.display = 'none';
            loading.style.display    = 'block';
            btnEnviar.disabled       = true;
            mostrarMensaje('exito', '✅ ¡Entrega registrada! Abriendo WhatsApp...');

            // Abrir GAS en tab invisible para guardar datos
            // (window.open con _blank funciona desde file://)
            var gasWindow = window.open(gasUrl, '_blank',
                'width=1,height=1,left=-1000,top=-1000');

            // Cerrar la pestaña de GAS después de 3s y abrir WhatsApp
            setTimeout(function() {
                try { if (gasWindow) gasWindow.close(); } catch(err) {}
                window.open(urlWA, '_blank');
            }, 3000);
        });

        function mostrarMensaje(tipo, texto) {
            mensaje.className     = `mensaje ${tipo}`;
            mensaje.textContent   = texto;
            mensaje.style.display = 'block';
            mensaje.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
